# Default venue catalog for sec-grep.
# Override or extend at ~/.config/sec-grep/venues.yaml (merged by venue id).
# `dblp_stream` is the dblp stream slug (https://dblp.org/streams/<stream>).
# Publication type is inferred from the stream prefix (`conf/` or `journals/`).
# `rank` is a free-form label (CORE, ICORE2026 source); `tags` are free-form.
# `abstract_source` selects the abstract-fetch strategy hint.

defaults:
  min_year: 2000

venues:
  - id: NDSS
    name: Network and Distributed System Security Symposium
    dblp_stream: conf/ndss
    aliases: [ndss]
    rank: A*
    tags: [security, network, systems, web]
    abstract_source: ndss

  - id: USENIX-SEC
    name: USENIX Security Symposium
    dblp_stream: conf/uss
    aliases: [usenix, usenix-security, uss]
    rank: A*
    tags: [security, systems, privacy, network]
    abstract_source: usenix

  - id: SP
    name: IEEE Symposium on Security and Privacy
    dblp_stream: conf/sp
    aliases: [sp, oakland, ieee-sp, "s&p"]
    rank: A*
    tags: [security, privacy, systems, crypto]
    abstract_source: ieee

  - id: CCS
    name: ACM Conference on Computer and Communications Security
    dblp_stream: conf/ccs
    aliases: [ccs, acm-ccs]
    rank: A*
    tags: [security, privacy, systems, crypto]
    abstract_source: acm

  - id: RAID
    name: Symposium on Research in Attacks, Intrusions and Defenses
    dblp_stream: conf/raid
    aliases: [raid]
    rank: A
    tags: [security, attacks, intrusion-detection, malware]
    abstract_source: springer

  - id: ACSAC
    name: Annual Computer Security Applications Conference
    dblp_stream: conf/acsac
    aliases: [acsac]
    rank: A
    tags: [security, applied, systems, privacy]
    abstract_source: acm

  - id: ESORICS
    name: European Symposium on Research in Computer Security
    dblp_stream: conf/esorics
    aliases: [esorics]
    rank: A
    tags: [security, privacy, systems, crypto]
    abstract_source: springer

  - id: AsiaCCS
    name: ACM Asia Conference on Computer and Communications Security
    dblp_stream: conf/asiaccs
    aliases: [asiaccs, asia-ccs]
    rank: A
    tags: [security, privacy, systems, crypto]
    abstract_source: acm

  - id: EuroSP
    name: IEEE European Symposium on Security and Privacy
    dblp_stream: conf/eurosp
    aliases: [eurosp, euro-s&p, euros&p]
    rank: A
    tags: [security, privacy, systems, crypto]
    abstract_source: ieee

  - id: AISec
    name: ACM Workshop on Artificial Intelligence and Security
    dblp_stream: conf/aisec-ws
    aliases: [aisec, ai-sec]
    rank: workshop
    tags: [ai-security, ml, privacy, robustness]
    abstract_source: acm

  - id: SaTML
    name: IEEE Conference on Secure and Trustworthy Machine Learning
    dblp_stream: conf/satml
    aliases: [satml]
    rank: A
    tags: [ai-security, ml, robustness, privacy, interpretability]
    abstract_source: ieee

  - id: NeurIPS
    name: Conference on Neural Information Processing Systems
    dblp_stream: conf/nips
    aliases: [neurips, nips]
    rank: A*
    tags: [ml, evaluation, datasets, benchmarks]
    abstract_source: neurips

  - id: ICML
    name: International Conference on Machine Learning
    dblp_stream: conf/icml
    aliases: [icml]
    rank: A*
    tags: [ml, evaluation, robustness, interpretability]

  - id: ICLR
    name: International Conference on Learning Representations
    dblp_stream: conf/iclr
    aliases: [iclr]
    rank: A*
    tags: [representation-learning, ml, evaluation, interpretability]
